# Default configuration for wheel control system

simulation:
  dt: 0.02
  max_steps: 1000
  lateral_limit: 0.5
  init_noise: 0.1

robot:
  wheel_base: 0.3
  wheel_radius: 0.05
  max_v: 1.5
  max_omega: 3.0
  tau_v: 0.1
  tau_omega: 0.08
  v_acc_max: 3.0
  w_acc_max: 10.0

trajectory:
  types:
    - bezier_spline
    - circle
    - sine
  n_points: 600
  dist_range: [0.5, 3.0]
  lateral_error_range: [0.0, 0.2]
  heading_error_deg_range: [0.0, 20.0]

logging:
  level: INFO
  save_csv: true
  log_dir: logs

visualization:
  enabled: true
  realtime: true
  figsize: [14, 10]
  save_animation: false
